<script>
// Embedded Jalaali conversion (no external dependency)
var jalaali={
  toJalaali:function(gy,gm,gd){
    var g_d_no,j_d_no,i,j_np,j_y,j_m,j_d;
    var g_days_in_month=[31,28,31,30,31,30,31,31,30,31,30,31];
    var j_days_in_month=[31,31,31,31,31,31,30,30,30,30,30,29];
    gy-=1600;gm-=1;gd-=1;
    g_d_no=365*gy+Math.floor((gy+3)/4)-Math.floor((gy+99)/100)+Math.floor((gy+399)/400);
    for(i=0;i<gm;i++)g_d_no+=g_days_in_month[i];
    if(gm>1&&((gy+1600)%4===0&&((gy+1600)%100!==0||(gy+1600)%400===0)))g_d_no++;
    g_d_no+=gd;
    j_d_no=g_d_no-79;
    j_np=Math.floor(j_d_no/12053);j_d_no%=12053;
    j_y=979+33*j_np+4*Math.floor(j_d_no/1461);j_d_no%=1461;
    if(j_d_no>=366){j_y+=Math.floor((j_d_no-1)/365);j_d_no=(j_d_no-1)%365;}
    for(i=0;i<11&&j_d_no>=j_days_in_month[i];i++)j_d_no-=j_days_in_month[i];
    j_m=i+1;j_d=j_d_no+1;
    return{jy:j_y,jm:j_m,jd:j_d};
  },
  toGregorian:function(jy,jm,jd){
    var g_y,g_m,g_d,g_d_no,j_d_no,j_np,i;
    var g_days_in_month=[31,28,31,30,31,30,31,31,30,31,30,31];
    var j_days_in_month=[31,31,31,31,31,31,30,30,30,30,30,29];
    jy-=979;jm-=1;jd-=1;
    j_d_no=365*jy+Math.floor(jy/33)*8+Math.floor((jy%33+3)/4);
    for(i=0;i<jm;i++)j_d_no+=j_days_in_month[i];
    j_d_no+=jd;
    g_d_no=j_d_no+79;
    g_y=1600+400*Math.floor(g_d_no/146097);g_d_no%=146097;
    var leap=true;
    if(g_d_no>=36525){g_d_no--;g_y+=100*Math.floor(g_d_no/36524);g_d_no%=36524;if(g_d_no>=365)g_d_no++;else leap=false;}
    g_y+=4*Math.floor(g_d_no/1461);g_d_no%=1461;
    if(g_d_no>=366){leap=false;g_d_no--;g_y+=Math.floor(g_d_no/365);g_d_no%=365;}
    for(i=0;i<12&&g_d_no>=(i===1&&leap?29:g_days_in_month[i]);i++)g_d_no-=i===1&&leap?29:g_days_in_month[i];
    g_m=i+1;g_d=g_d_no+1;
    return{gy:g_y,gm:g_m,gd:g_d};
  },
  jalaaliMonthLength:function(jy,jm){
    if(jm<=6)return 31;
    if(jm<=11)return 30;
    if(jy>979&&(jy-979)%33%4===1)return 30;
    return 29;
  }
};
</script>
